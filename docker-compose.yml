version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: stock_postgres
    environment:
      POSTGRES_DB: stockdb
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: pfe-api:latest
    container_name: stock_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/stockdb
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      AUTHORIZED_REDIRECT_URIS: ${AUTHORIZED_REDIRECT_URIS:-http://localhost:5174/auth/callback}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:5175}
    ports:
      - "8080:8080"
    volumes:
      - ml_models:/app/ml-models
    restart: unless-stopped

  stock-web:
    image: pfe-stock-web:latest
    container_name: stock_web
    depends_on:
      - api
    ports:
      - "5174:80"
    restart: unless-stopped

volumes:
  postgres_data:
  ml_models:
